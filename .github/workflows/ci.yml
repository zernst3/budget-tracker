name: CI

# Quality gates (fmt, clippy pedantic + unwrap/expect denied, tests) run on
# every push and PR. The image build/push + deploy stages run only on push to
# main and reference secrets/variables that may not exist yet (Zach provisions
# them during the first interactive deploy, SPEC.md §12). CI is expected to be
# red on the deploy stage until then.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy (pedantic + unwrap/expect denied)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Pedantic lints on top of the workspace lints table (which already
      # forbids unsafe and denies unwrap_used/expect_used/panic). -D warnings
      # makes any clippy finding fail the build.
      - run: cargo clippy --workspace --all-targets --all-features -- -W clippy::pedantic -D warnings

  test:
    name: cargo test --workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  build-and-push:
    name: build + push image to GHCR
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          echo "image=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # The secrets below do NOT exist yet. Zach provisions Azure + sets these
    # GitHub Actions secrets during the first interactive deploy (SPEC.md §12).
    # This stage is expected to fail until then.
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to Container App
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name "${{ vars.CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.RESOURCE_GROUP }}" \
              --image "ghcr.io/${{ github.repository }}:${{ github.sha }}"
